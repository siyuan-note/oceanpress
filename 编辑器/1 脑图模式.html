    <main data-type="NodeDocument" data-n-id="20210127214334-8pw3tq9" type="doc" updated="20210502234059" data-n-id="20210127214334-8pw3tq9"><h1 data-type="NodeDocument" data-n-id="20210127214334-8pw3tq9" type="doc" updated="20210502234059" data-n-id="20210127214334-8pw3tq9">1 脑图模式</h1>
<p updated="20210502234059" data-type="NodeParagraph" data-n-id="20210127214455-72kz6u5">通过在文件树上右键文档下拉菜单打开脑图模式，仅支持基本的创建、移动，主要用于整理思路，快速创建和浏览文档大纲。<em data-type="NodeTag">#TODO#</em></p>
<ul data-type="NodeList" data-n-id="20210127214646-98sesxk">
<li data-type="NodeListItem" data-n-id="20210127214715-i8ph02d"><span class="ListItemDot"></span>
<p data-type="NodeParagraph" data-n-id="20210302222946-lf7ec8h"><kbd>Enter</kbd> 创建平级节点</p>
</li>
<li data-type="NodeListItem" data-n-id="20210127214729-u28jgjo"><span class="ListItemDot"></span>
<p data-type="NodeParagraph" data-n-id="20210302222946-5v3tp2r"><kbd>Tab</kbd> 或者 <kbd>Insert</kbd> 创建子节点，仅<oceanpress-block-ref src="../%e5%86%85%e5%ae%b9%e5%9d%97/1%20%e5%86%85%e5%ae%b9%e5%9d%97%e7%b1%bb%e5%9e%8b.html#20210104090624-vsksysm" title="容器块"><a href="../%e5%86%85%e5%ae%b9%e5%9d%97/1%20%e5%86%85%e5%ae%b9%e5%9d%97%e7%b1%bb%e5%9e%8b.html#20210104090624-vsksysm">容器块</a></oceanpress-block-ref >和<oceanpress-block-ref src="../%e5%86%85%e5%ae%b9%e5%9d%97/1%20%e5%86%85%e5%ae%b9%e5%9d%97%e7%b1%bb%e5%9e%8b.html#20210104090624-zdi6qkg" title="标题块"><a href="../%e5%86%85%e5%ae%b9%e5%9d%97/1%20%e5%86%85%e5%ae%b9%e5%9d%97%e7%b1%bb%e5%9e%8b.html#20210104090624-zdi6qkg">标题块</a></oceanpress-block-ref >下可创建子节点</p>
</li>
<li data-type="NodeListItem" data-n-id="20210127215026-vmkde43"><span class="ListItemDot"></span>
<p data-type="NodeParagraph" data-n-id="20210302222946-sjp98hs">仅标题块支持拖拽移动位置</p>
</li>
<li data-type="NodeListItem" data-n-id="20210127215300-qn8jyh8"><span class="ListItemDot"></span>
<p data-type="NodeParagraph" data-n-id="20210302222946-4rkgjtm">双击节点可打开悬浮编辑框进行内容编辑</p>
</li>
</ul>
