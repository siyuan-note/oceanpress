name: npm Publish

permissions:
  contents: read
  id-token: write

# 触发条件：在推送 tag 时触发
on:
  push:
    tags:
      - 'v*'

# 任务
jobs:
  publish:
    # 服务器环境：最新版 Ubuntu
    runs-on: ubuntu-latest
    steps:
      # 拉取代码
      - name: Checkout
        uses: actions/checkout@v4

      # 设置 pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.1

      # 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      # 安装依赖
      - name: Install Dependencies
        run: pnpm i

      # 构建项目
      - name: Build Project
        run: |
          pnpm rpc_build
          pnpm server_build
          cd apps/frontend && pnpm build

      # 发布到 npm (使用 provenance)
      - name: Publish to npm
        run: cd apps/frontend && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
